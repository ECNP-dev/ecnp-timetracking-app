
name: build-ECNP-time-tracker

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    defaults:
      run:
        working-directory: electron-app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build renderer (Vite)
        run: npm run react-build

      - name: Build Electron (portable + zip + dir)
        run: npm run dist

      # -----------------------------
      # UPLOAD TRUE PORTABLE EXE
      # -----------------------------
      - name: Upload Portable EXE
        uses: actions/upload-artifact@v4
        with:
          name: ECNP-TimeTracker-Portable
          path: electron-app/dist/*.exe
          if-no-files-found: error

      - name: Upload ZIP Build
        uses: actions/upload-artifact@v4
        with:
          name: ECNP-TimeTracker-Zip
          path: electron-app/dist/*.zip
          if-no-files-found: error

      - name: Upload win-unpacked Build
        uses: actions/upload-artifact@v4
        with:
          name: ECNP-TimeTracker-win-unpacked
          path: electron-app/dist/win-unpacked/**
          if-no-files-found: error

      - name: Upload builder-debug.yml
        uses: actions/upload-artifact@v4
        with:
          name: builder-debug
          path: electron-app/dist/builder-debug.yml
          if-no-files-found: error
``
