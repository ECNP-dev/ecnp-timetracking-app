
name: build-electron

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: electron-app
        run: |
          npm install

      - name: Build renderer (Vite)
        working-directory: electron-app
        run: |
          npm run react-build

      - name: Build Electron (portable + zip + dir)
        working-directory: electron-app
        run: |
          npm run dist

      # -----------------------------
      # UPLOAD CORRECT PORTABLE OUTPUT
      # -----------------------------
      - name: Upload Portable ZIP
        uses: actions/upload-artifact@v3
        with:
          name: ECNP-TimeTracker-Portable-Zip
          path: |
            electron-app/dist/*.zip

      - name: Upload win-unpacked
        uses: actions/upload-artifact@v3
        with:
          name: ECNP-TimeTracker-win-unpacked
          path: |
            electron-app/dist/win-unpacked/**

      - name: Upload builder-debug.yml
        uses: actions/upload-artifact@v3
        with:
          name: builder-debug
          path: electron-app/dist/builder-debug.yml
