
name: build-electron

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    defaults:
      run:
        working-directory: electron-app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build renderer (Vite)
        run: npm run react-build

      - name: Build Electron App (portable + zip + dir)
        run: npm run dist

      #
      # --- ARTIFACT UPLOADS (Using the NEW GitHub Actions v4) ---
      #
      
      - name: Upload portable ZIP
        uses: actions/upload-artifact@v4
        with:
          name: portable-zip
          path: electron-app/dist/*.zip
          if-no-files-found: error

      - name: Upload win-unpacked folder
        uses: actions/upload-artifact@v4
        with:
          name: win-unpacked
          path: electron-app/dist/win-unpacked/**
          if-no-files-found: error

      - name: Upload builder-debug.yml
        uses: actions/upload-artifact@v4
        with:
          name: builder-debug
          path: electron-app/dist/builder-debug.yml
          if-no-files-found: error
