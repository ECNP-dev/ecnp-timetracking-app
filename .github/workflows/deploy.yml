
name: build-electron

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    defaults:
      run:
        working-directory: electron-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build renderer
        run: npm run react-build

      - name: Build raw portable app (win-unpacked)
        run: npm run dist

      - name: Upload win-unpacked folder
        uses: actions/upload-artifact@v4
        with:
          name: ECNP-TimeTracker-win-unpacked
          path: electron-app/dist/win-unpacked/**
          if-no-files-found: error
