
name: Build & Deploy ECNP Time Tracker

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:

  build-electron:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 18 for Electron
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install frontend dependencies
        working-directory: electron-app
        run: npm install

      - name: Clear electron-builder cache
        run: |
          if (Test-Path "$env:LOCALAPPDATA\electron-builder") {
            Remove-Item -Recurse -Force "$env:LOCALAPPDATA\electron-builder"
          } else {
            echo "no cache"
          }

      - name: Build portable Electron version
        working-directory: electron-app
        run: npm run dist

      - name: Upload Portable Build
        uses: actions/upload-artifact@v4
        with:
          name: ECNP-TimeTracker-Portable
          path: |
            electron-app/dist/*.exe
            electron-app/dist/*.zip


  deploy-functions:
    runs-on: ubuntu-latest
    needs: build-electron

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 18 for Azure Functions
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install backend dependencies
        working-directory: functions-api
        run: npm install --legacy-peer-deps

      - name: Zip Function App package
        run: |
          cd functions-api
          zip -r ../functions.zip .

      - name: Azure Login using Service Principal
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Function App
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ secrets.AZURE_FUNCTIONAPP_NAME }}
          package: functions.zip
