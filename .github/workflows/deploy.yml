
name: Build & Deploy ECNP Time Tracker

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: functions-api   # IMPORTANT
  NODE_VERSION: 18

jobs:
  build-electron:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies (frontend)
        working-directory: electron-app
        run: npm install

      - name: Build Electron installer
        working-directory: electron-app
        run: npm run dist

      - name: Upload Electron installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ECNP-TimeTracker-Installer
          path: electron-app/dist/*.exe


  deploy-functions:
    runs-on: ubuntu-latest
    needs: build-electron

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install backend dependencies
        working-directory: functions-api
        run: |
          npm ci || npm install --legacy-peer-deps

      - name: Archive function app files
        run: |
          cd functions-api
          zip -r ../functions.zip .

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Azure Function
        uses: azure/functions-action@v1
        with:
          app-name: ${{ secrets.AZURE_FUNCTIONAPP_NAME }}
          package: functions.zip
