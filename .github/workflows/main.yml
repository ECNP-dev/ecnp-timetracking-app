
name: Build and Deploy ECNP Time Tracker

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-electron:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        working-directory: electron-app
        run: npm install

      - name: Build Electron installer
        working-directory: electron-app
        run: npm run dist

      - name: Upload Electron installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ecnp-time-tracker-installer
          path: electron-app/dist/*.exe

  deploy-functions:
    runs-on: ubuntu-latest
    needs: build-electron

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Azure Functions Action
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ secrets.AZURE_FUNCTIONAPP_NAME }}
          package: "functions-api"
          publish-profile: ${{ secrets.AZURE_FUNC_PUBLISH_PROFILE }}
