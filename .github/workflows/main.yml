
name: Build and Deploy ECNP Time Tracker

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-electron:
    runs-on: windows-latest

    steps:
    
      - name: Show workflow identity
        run: |
          echo "Workflow file: $GITHUB_WORKFLOW"
          echo "Ref: $GITHUB_REF"
          echo "SHA: $GITHUB_SHA"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        working-directory: electron-app
        run: npm install

      - name: Build Electron installer
        working-directory: electron-app
        run: npm run dist

      - name: Upload Electron installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ecnp-time-tracker-installer
          path: electron-app/dist/*.exe


  deploy-functions:
    runs-on: ubuntu-latest
    needs: build-electron

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 18 for Azure Functions
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install backend dependencies (Functions API)
        working-directory: functions-api
        run: |
          npm ci || npm install --legacy-peer-deps

      - name: Zip Function App package
        run: |
          cd functions-api
          zip -r ../functions.zip .

      - name: Azure Login using Service Principal
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Function App
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ secrets.AZURE_FUNCTIONAPP_NAME }}
          package: functions.zip

